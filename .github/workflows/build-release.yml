name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUILD_NAME="${TAG#v}"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "Building $BUILD_NAME+${GITHUB_RUN_NUMBER} from tag $TAG"

      - name: Patch pubspec.yaml version
        run: |
          sed -i -E "s/^version: .*/version: ${{ steps.version.outputs.build_name }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - run: flutter pub get
      - run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.build_name }} \
            --build-number=${{ github.run_number }}
      - run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.build_name }} \
            --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  release:
    # iOS is built and uploaded by Xcode Cloud — see ios/ci_scripts/ci_post_clone.sh.
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            app-release.aab
          generate_release_notes: true
