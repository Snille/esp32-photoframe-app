<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP Frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: #333;
      background: #faf8f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 1024px;
    }
    .banner {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      margin-bottom: 32px;
    }
    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
    }
    a {
      color: #7a5230;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="feature_graphic.png" alt="ESP Frame" class="banner">
    <p>Companion app for the
      <a href="https://github.com/aitjcize/esp32-photoframe">esp32-photoframe</a>
      project</p>
    <a href="privacy-policy.html">Privacy Policy</a>
  </div>
</body>
</html>
